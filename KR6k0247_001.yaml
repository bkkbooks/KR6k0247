謂人以刀去其男根是名犍不男也妬謂男根似無見他行婬因生妬心遂感有根是名妬不男變謂能變現也遇男則變為女遇女則變為男是名變不男半謂半月能男半月不能男是名半不男也五種不男人否答云非汝非弑父弑母弑和尚阿闍黎破羯磨轉法輪僧惡心出佛身血名為五逆五逆罪重佛不許度汝非此人否答云非汝非天子阿修羅子名為非人變為人形而來受戒否答云非汝非諸龍畜等有大通力能變化者化為人形而來受戒否答云非汝諸人身中各不帶佩男女二形否答云不諸佛子此是十三重難重難既無甚是淨器我今更問汝十六輕遮汝當仍前一一實答善男子汝諸人出家以來各各訓導是何法名戒子各答己名此是汝諸人入道之法名一生之稱呼從今受戒而去凡見和尚阿闍黎同壇尊眾上中下座宰官長者朋友知識父母師長之前皆當稱此兩字法名不得言你我某甲小僧之稱汝諸人今日壇頭得戒和尚是誰戒子答云某堂上上某下某和尚教授師云此是某寺某宗師是汝諸人得戒和尚梵語和尚此云歷生一云力生三乘道力五分法身皆藉歷此師威力而生故云歷生又云依學謂依隨此師學出世法故云依學今日受戒若無此師戒無從發汝當記取和尚尊名認取和尚慈相若不記得名字貌相受戒不得從今已去凡遇節臘結制解制當須懷香禮拜得戒和尚若遇路途遙遠不得侍詣當以焚香遙空稱名致敬不得慢意汝諸人年滿二十否答云滿衣鉢臥具具足否答云具足父母聽汝出家否答云聽汝不負人錢債作不還心而來受戒否答云無汝非他人家下使人否答云非汝非當朝有名有祿官人否答云非汝是丈夫否答云是既是丈夫又要無病一疥癩二癰疽三白癩四乾痟五顛狂汝諸人果無如是五病否答云無諸佛子此是十六輕遮前無重難後無輕遮甚是淨器戒可得授我今於此問汝少間壇上眾師之前亦如是問汝今於此答我少間壇上眾師之前亦如是答汝當收取衣鉢恭往壇前燒香禮拜作觀運想壇上十師作十方佛次當誦呪祈禱三寶諸天乞求加護願登壇時無諸魔障我往壇上作白和告眾僧僧若許可我即以手招汝上壇從僧乞授具足戒開導云諸子作禮一拜起具問訊分班長跪合掌教授師下座向案問訊引請前行引教授師上壇向上端莊問訊壇上止魚停呪教授師合掌白云惟願和尚大眾慈悲證明作白大德僧聽彼沙彌某甲等從和尚上某下某求授具足戒若僧時到僧忍聽我已問竟將來白如是良久作白成否諸師答云成教授師轉身傍立召諸沙彌云善男子等汝來諸沙彌徐徐上壇教授師云向上排班展全具出靸合掌求戒弟子某甲戒子答名教授師云頂禮壇上諸師三拜起身問訊長跪合掌教授白云諸佛子等懇惻至誠仰憑清眾求哀乞戒乞戒之語汝合自陳恐汝未能皆隨我道大德僧聽我某甲等從和尚上某下某求授具足戒我某甲等今從眾僧乞受具足戒上某下某為和尚是願僧慈愍故拔濟我從是願僧起教授師三稱戒子隨聲應接每一稱頂禮一拜三稱三拜教授師又云諸佛子等擡頭認師教授師舉拱示云此是某處某堂上某宗師是汝諸人得戒大和尚此是某處某禪師是汝諸人羯磨師此是現前諸位禪師是汝諸人尊證師汝當眼觀衣鉢耳聽羯磨心心相續志誠受戒不得餘覺餘思戒子頂禮一拜教授師向上問訊歸位敷座訖羯磨師白云大德僧聽此沙彌某甲從和尚上某下某求授具足戒此沙彌某甲今從眾僧乞受具足戒上某下某為和尚若僧時到僧忍聽我問諸難事白如是師良久云諸佛子等安陀會多羅僧僧伽黎鉢多羅尼師壇是汝有否沙彌答云有師又云諸佛子等諦聽今是至誠時實語時今隨所問汝當隨實答僧祇云汝若不實答便欺誑諸天魔梵沙門婆羅門諸天世人亦欺誑如來亦及眾僧自得大罪也諸佛子等汝名某甲戒子答名汝不犯邊罪耶答云不汝不犯比丘尼耶答云不汝非賊心受戒耶答云非汝非破內外道耶答云非汝非黃門耶答云非汝非弑父耶答云非汝非弑母耶答云非汝非弑阿羅漢耶答云非汝非破僧耶答云非汝非惡心出佛身血耶答云非汝非非人耶答云非汝非畜生耶答云非汝非二形耶答云非汝名何等戒子答名和尚是誰答云上某下某和尚年滿二十未答云滿衣鉢具足否答云具足父母聽汝出家否答云聽汝不負人債否答云無汝非奴否答云非汝非官人否答云非汝是丈夫否答云是丈夫有如是病疥癩癰疽乾痟癲狂汝今有如是病耶答云無第九明戒體法薩婆多論云凡欲受戒先與說法引導開解令於一切境上起慈悲心便得增上戒應語彼言諸佛子前無重難後無輕遮甚是淨器眾僧同慶當授汝戒但深戒上善廣周法界量等虗空今欲進受要須緣境發心心境相容方發無作薩婆多論云凡欲受戒先為汝說法引導開解汝諸人於無始來於一切境上造諸惡業惡徧法界今欲受戒翻前惡境並起善心故戒法所因還徧法界故我如來隨眾生心造無邊之業制無邊之戒戒隨所制故須緣境境量雖多舉要而言不出乎二種一者情境二者非情境言情境者上至諸佛下至眾生十界正報中陰有情凡有心者皆名情境非情境者十界依報一切世間山河大地草木叢林舟車屋宅田園地水火風虗空識等佛說聖教儒流文字形象墖廟等名非情境諸佛子既知境界如此寬曠當須依境發心心有三品中下二心劣弱非勝但能自度不能度人我今教汝發上品心求上品戒何為上品心今於我諸師座前立三種誓願一者誓斷一切惡無惡不斷二者誓修一切善無善不修三者誓度一切眾生無一眾生不度發此三種大願已白四羯磨言下進授大比丘戒不為但求聲聞小果故直欲成就三聚淨戒故趨向三解脫門故正求佛果求大涅槃令法久住故發如是上品心求上品戒次當開廣汝懷者良由戒法體周法界量等塵沙終不以汝諸人現前父母所生報得狹劣身心而能容受當作虗空器量之身方能領納塵沙戒法故論云若此戒法有形色者入汝身時汝當作天崩地裂之聲由是非色法故令汝不覺不知當起驚懷之意發上品殷重之心領納如來清淨妙戒受大比丘戒白四羯磨先作一白疊事告知次秉三羯磨量其可否惟願和尚大眾不吝慈悲布施其戒同心聽秉甚勿異緣令此諸人感發圓宗戒體將秉羯磨聽宣作白第十正授戒法大德僧聽此沙彌某甲等從和尚上某下某求授具足戒此沙彌某甲等今從眾僧乞授具足戒上某下某為和尚沙彌某甲等自說清淨無諸難事年滿二十三衣鉢具若僧時到僧忍聽授沙彌某甲等具足戒上某下某為和尚白如是作白成否尊證答云成諸佛子我以作白和問眾僧僧皆默然許受汝戒今作羯磨動彼勝法當用運心承仰莫令昏散惟願和尚大眾慈悲聽秉初番羯磨作梵大德僧聽此沙彌某甲等從和尚上某下某求授具足戒此沙彌某甲等今從眾僧乞授具足戒上某下某為和尚沙彌某甲等自說清淨無諸難事年滿二十三衣鉢具僧今授沙彌某甲等具足戒上某下某為和尚誰諸長老忍僧與沙彌某甲等授具足戒上某下某為和尚者默然誰不忍者說此是初番羯磨成否尊證答云成諸佛子我已秉初番羯磨竟僧皆默可十方法界妙善戒法隨羯磨聲悉皆運動今秉第二羯磨當起忻心勿縱怠意惟願和尚大眾再賜慈悲聽秉第二番羯磨作梵大眾僧聽此沙彌某甲等從和尚上某下某求授具足戒此沙彌某甲等今從眾僧乞授具足戒上某下某為和尚沙彌某甲等自說清淨無諸難事年滿二十三衣鉢具僧今授沙彌某甲等具足戒上某下某為和尚誰諸長老忍僧與沙彌某甲等授具足戒上某下某為和尚者默然誰不忍者說此是第二番羯磨成否尊證答云成諸佛子我已秉第二羯磨竟僧並和合今十方法界妙善戒法由心業力羯磨勝功悉皆舉集虗空之中如雲如葢覆汝頂上盤旋不散至第三羯磨竟時此諸善法悉皆流入汝等八識田中永為菩提種子依此修行直至成佛惟有此第三番羯磨在正是汝等納戒之時汝當發心總虗空界心緣救攝三有眾生并願護持三世佛法如此要期承仰聖教惟願和尚大眾不倦慈悲一齊合掌佐助我今為此諸人舉此第三番羯磨正得戒羯磨令法圓滿作梵大德僧聽此沙彌某甲等從和尚上某下某求授具足戒此沙彌某甲等自說清淨無諸難事年滿二十三衣鉢具僧今授沙彌某甲等具足戒上某下某為和尚誰諸長老忍僧聽與沙彌某甲等授具足戒上某下某為和尚者默然誰不忍者說此是第三番正得戒羯磨成否尊證答云成僧已忍與沙彌某甲等授具足戒竟上某下某為和尚僧忍默然故是事如是持結詞成否尊證答云成諸佛子等我已作法竟汝已得戒了從今下壇已去諸惡莫作眾善奉行當須專謹護持切莫毀犯勝事既圓常生慶幸惟有四依隨相等法懇乞和尚慈悲垂示和尚云諸善男子等汝稱法名我為汝說四依法師云我某甲師云諸善男子聽如來至真等正覺說四依法依此纔出得家受得具足戒纔成得比丘法第一依糞掃衣依此出得家受得具足戒成得比丘法於是中盡形壽能持否答云能持若得長利檀越施衣割壞衣得受第二依托鉢乞食依此出得家受得具足戒成得比丘法於是中盡形壽能持否答云能持若得長利若僧差食檀越送食月八日食十五日食月初日食若僧常食檀越請食得受第三依樹下坐依此出得家受得具足戒成得比丘法於是中盡形壽能持否答云能持若得長利若別房尖頭屋小房石室兩房一戶得受第四依腐藥依此出得家受得具足戒成得比丘法於是中盡形壽能持否答云能持若得長利酥油生酥蜜石蜜得受和尚又云諸善男子等汝再稱法名我為汝說隨相法我某甲和尚撫尺云諸善男子聽如來至真等正覺說四波羅夷法若比丘犯一一法非沙門非釋子第一汝一切不得犯婬作不淨行受婬欲法乃至共畜生若有犯非沙門非釋子世尊說譬喻斷頭之人終不能活比丘犯婬波羅夷不能還成比丘行於是中盡形壽不得作能持否答云能持第二汝一切不得犯盜下至草葉若比丘盜人五錢若過五錢若自取教人取若自破教人破若自斫教人斫若自燒教人燒若埋若壞色者若有犯非沙門非釋子世尊說譬如斷多羅樹心終不能復更生長比丘犯盜波羅夷不能還成比丘行於是中盡形壽能持否答云能持第三汝一切不得故斷眾生命下至蟻子若比丘故自手斷人命持刀授與人教死嘆死與人非藥若墮胎若厭禱殺自作方便若教人作者非沙門非釋子世尊說譬喻缺鼻之針終不堪用比丘犯殺波羅夷終不能還成比丘行於是中盡形壽不得作能持否答云能持第四汝一切不得大妄語乃至戲笑若比丘非真實非己有自言我得上人法得禪得定得四空定得須陀洹果斯陀含果阿那含果阿羅漢果天龍來鬼神來供養非沙門非釋子世尊說譬喻大石破為二分終不能合比丘犯大妄語波羅夷終不能還成比丘行於是中盡形壽不得作能持否答云能持和尚又云更有十三僧伽婆尸沙法二不定法三十尼薩耆波逸提法九十波逸提法四波羅提提舍尼法一百應當學法七滅諍法不得犯能持否答云能持師云諸善男子等此是比丘二百五十清淨戒行一一不得犯能持否答云能持和尚撫尺云諸善男子等我已說法竟汝已得戒了從今下壇已去勤修戒定慧息滅貪嗔癡於菩薩法中增長利益更當記取於今某年月日時某處進比丘具足大戒勝事既成當生慶幸一拜起身作禮回向開導云作禮一拜起身師舉云戒子隨和隨拜受戒功德殊勝行無邊勝福皆回向普願沉溺諸有情速往無量廣佛剎十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密下座同上壇說菩薩戒法卷下設座訖執事鳴磬三下禪堂開靜接鍾方丈傳香大眾俱集侍者傳爐座上拜畢開導滾擊子殿主擂皷開導領諸子徐徐至方丈前長跪合掌開導入室展具拜起身傍立召諸佛子云作禮三拜起身問訊開導云轉身末位前行和尚舉南無本師釋迦牟尼佛大眾齊和迎至法堂前戒子兩邊對面長跪合掌和尚遶壇拜已陞座開導鳴磬一下鍾皷肅靜開導大展三拜長跪合掌和尚撫尺問云僧集否開導答云已集師云和合否答云和合師云僧集和合何所作為答云為諸弟子說菩薩大戒師云未授菩薩大戒者出否答云已出師云善哉可爾答云是一拜起身傍立滾擊子三遍師拈香云云畢開導召戒子云上香又云一齊起身向上排班展全具開導召云某甲戒子稱名聞磬聲至誠頂禮三拜問訊長跪合掌開導舉香贊一塵纔爇藏海圓收恒沙諸佛現毛頭觸著便歸休香靄初浮心地戒光流香雲葢菩薩摩訶薩三遍開導云作禮三拜又云夫登菩薩位須憑戒品以高躋開菩薩心是仗佛口而生降佛子既發無上志入毗尼壇我今為汝一心恭請某處某堂上某下某某宗師為汝等作得戒教授菩薩阿闍黎請師之語汝合自陳恐汝未能當隨我道開導作梵戒子隨和大德一心念我某甲今請大德為得戒教授菩薩阿闍黎願大德為我作得戒教授菩薩阿闍黎我依大德故得受菩薩心地戒慈愍故一拜慈愍故一拜大慈愍故一拜和尚撫尺云諸佛子等汝既殷勤伸請我為汝等作得戒教授菩薩阿闍黎所有言教汝當諦聽師又撫尺云諸善男子等汝現身不作七逆罪否答云無師云七逆者出佛身血弑父弑母弑和尚弑阿闍黎破羯磨轉法輪僧弑聖人汝無是罪否答云無師撫尺又云諸善男子等汝今志心求受一切菩薩上玅淨戒我今為汝一心恭請三寶護法諸天攝授覆護方堪進戒先當為汝一心恭請此方娑婆教主本師釋迦牟尼世尊為汝等作得戒大和尚次請文殊師利菩薩為汝等作羯磨阿闍黎再請彌勒菩薩為汝等作教授阿闍黎更請十方諸佛為汝等作尊證阿闍黎并請十方諸大菩薩為汝等作同學伴侶汝當至誠合掌恭肅歸投聽我一心至誠奉請開導舉云香花引又云香花請師云我某甲一心奉請華藏世界毗盧遮那世尊圓滿報身盧舍那世尊西方接引阿彌陀世尊盡虗空徧法界一切諸佛世尊惟願不違本誓慈光攝照證明受戒開導云作禮三拜又云香花引又云香花請師云我某甲一心奉請大小二乘毗尼律藏五篇三聚解脫木叉三藏十二分經權實教典離欲真淨甚深法寶南無大方廣佛華嚴經謹運一心歸命敬禮開導云作禮三拜又云香花引又云香花請師云我某甲一心奉請娑婆教主本師釋迦牟尼世尊為得戒大和尚惟願不違本誓慈光攝照親承授戒開導云作禮三拜又云香花引又云香花請師云我某甲一心奉請大智文殊師利菩薩為羯磨阿闍黎龍華教主彌勒菩薩為教授阿闍黎十方諸佛為證戒阿闍黎十方諸大菩薩為同學伴侶惟願不違本誓慈光攝照證明受戒開導云作禮三拜又云香花引又云香花請師云我某甲一心奉請律藏會上優波離尊者西天東土歷代祖師終南山中諸大律師慧山清泉堂上上元下白大和尚華山隆昌堂上上見下月大和尚浮山華嚴堂上上文下弱大和尚本寺開山列代尊僧周鉢明志二位禪師惟願不違本誓慈光攝照證明受戒開導云作禮三拜又云香花引又云香花請師云我某甲一心奉請華嚴會上寄位諸天梵釋四王天龍八部護戒善神金剛力士山川大地水陸虗空諸大善神伽藍土地一切靈祗惟願不違本誓臨降戒壇精嚴擁護開導云作禮三拜師云諸善男子等三寶光臨萬神侍衛作大證明授正戒法我依瓔珞經中所說佛告諸佛子今正說正戒善男子善女人當受戒時師云我某甲先禮過去世盡過去際一切佛禮未來世盡未來際一切佛禮現在世盡現在際一切佛開導云作禮三拜師撫尺云我某甲禮過去世盡過去際一切法禮未來世盡未來際一切法禮現在世盡現在際一切法開導云作禮三拜師撫尺云我某甲禮過去世盡過去際一切僧禮未來世盡未來際一切僧禮現在世盡現在際一切僧以上一一師舉子答每畢三拜師撫尺又云諸佛子等我今授汝四不壞信我某甲從今時盡未來際身歸依佛答云歸依佛師云歸依法答云歸依法師云歸依贒聖僧答云歸依贒聖僧師云歸依正法戒答云歸依正法戒三說戒子三答師又云從今時盡未來際身歸依佛已答云歸依佛已師云歸依法已答云歸依法已師云歸依賢聖僧已答云歸依賢聖僧已師云歸依正法戒已答云歸依正法戒已三說戒子三答師又云諸佛子等我今教汝悔三世罪師云我某甲若過去答云若過去師云身口意答云身口意師云十惡罪答云十惡罪師云願畢竟不起答云願畢竟不起師云盡未來際答云盡未來際師云若未來答云若未來師云身口意答云身口意師云十惡罪答云十惡罪師云願畢竟不起答云願畢竟不起師云盡未來際答云盡未來際師云若現在答云若現在師云身口意答云身口意師云十惡罪答云十惡罪師云願畢竟不起答云願畢竟不起師云盡未來際答云盡未來際三說三答開導云作禮三拜師云諸佛子等既悔過已我今教汝發大誓願開導云作禮一拜起身和尚舉云眾生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成唱三和拜開導云問訊長跪合掌師云既發願已廣度不窮正堪得戒今更令汝秉心殷重乞法圓成䖍請文殊師利菩薩作正羯磨我今代為汝等三番羯磨珍重了辨敬謹受持我今問汝諸人是菩薩否答云是師云既是菩薩汝當眼觀諸佛耳聽羯磨心心相續至誠受戒開導云作禮三拜師即出位焚香作梵白云仰白十方無窮無盡一切諸佛諸大菩薩慈悲垂聽現前菩薩弟子某甲今於我某甲菩薩所痛念生死發菩提心為請現坐道場本師釋迦大和尚獅子座前求受一切菩薩心地法一切菩薩心地學一切菩薩心地戒所謂攝律儀戒攝善法戒饒益有情戒此是過去一切菩薩已受已學已解已行已成未來一切菩薩當受當學當解當行當成現在一切菩薩今受今學今解今行今成當來作佛師即起身就位撫尺云諸佛子等從今受戒直至成佛於其中間不得觸犯能持否答云能持以上從仰白十方起下至此能持三番俱同師又云諸佛子等我今為汝初番羯磨已成十方諸佛諸大菩薩悉皆歡喜默然許可從臍輪中放大寶光照汝身心令汝得戒十方世界妙善戒法聞羯磨聲悉皆運動堪受戒法令此戒心孝順奉行世世生生堅固不退此是初番羯磨已竟至再叮嚀理取第二番羯磨師又出位作梵白云同前已畢復就位撫尺云上亦然又云諸佛子等我今為汝二番羯磨已成十方諸佛諸大菩薩悉皆歡喜默然許可從胸卍字放大寶光照汝身心令汝得戒十方世界妙善戒法聞羯磨聲悉皆舉集虗空之中如雲如蓋在汝頂上盤旋不散堪受戒法令此戒心孝順奉行世世生生堅固不退此是二番羯磨已竟至再叮嚀理取第三番羯磨師更出位焚香作梵白云亦同前畢師更就位撫尺云亦同上師又云諸佛子等我今為汝三番羯磨已成十方諸佛諸大菩薩悉皆歡喜默然許可從肉髻中放大寶光照汝身心令汝得戒十方世界妙善戒法聞羯磨聲如瓶瀉水從汝頂門流入汝等八識田中永為菩提種子從此修行直至成佛永無退轉堪受戒法令此戒心孝順奉行世世生生堅固不退此是三番羯磨已竟師撫尺又云諸佛子等上來三番羯磨已竟十方諸佛諸大菩薩悉皆歡喜默然許可汝等現在心即是佛當來決定作佛向去真參實悟得法相應恒住性戒究竟不動更當攝相護持我依梵網經中授汝十種無盡清淨戒法汝當至誠頂受師云我某甲第一不得故殺是菩薩戒不得犯能持否答云能持第二不得故盜是菩薩戒不得犯能持否答云能持第三不得故婬是菩薩戒不得犯能持否答云能持第四不得故妄語是菩薩戒不得犯能持否答云能持第五不得故酤酒是菩薩戒不得犯能持否答云能持第六不得故說四眾過是菩薩戒不得犯能持否答云能持第七不得故自讚毀他是菩薩戒不得犯能持否答云能持第八不得故慳惜加毀是菩薩戒不得犯能持否答云能持第九不得故嗔心不受誨是菩薩戒不得犯能持否答云能持第十不得故謗三寶是菩薩戒不得犯能持否答云能持師復撫尺云諸佛子等從第一不得故殺乃至第十不得故謗三寶此是大乘菩薩十重無盡清淨大戒一一不得犯能持否答云能持師云諸佛子等既受戒已應當頂戴受持不得違犯菩薩戒經云眾生受佛戒即入諸佛位位同大覺已真是諸佛子和尚又云諸佛子等汝稱法名我為汝說傳授錫杖法汝當至誠頂受師云我某甲師舉錫杖云善男子等還見麼師振杖云汝還聞麼又云既見既聞是個什麼又振杖云即此見聞非見聞無餘聲色可呈君個中若了原無物體用何妨分不分永嘉云降龍鉢解虎錫四鈷金環鳴歷歷不是標形虗自持如來寶杖親踪跡師舉杖與羯磨或教授一一傳去呪眾當隨和待傳畢方止呪云唵那㗚𠾱那㗚𠾱那㗚吒鉢底那㗚帝娜夜鉢儜吽癹吒開導云作禮三拜師云諸佛子等我已說法竟汝已得戒了從今下壇已去勤修戒定慧息滅貪嗔癡廣化眾生齊成佛道既為佛子當報佛恩更當記取于某年月日時某處某和尚圓菩薩大戒勝事既成當生慶幸開導云作禮一拜起身師舉回向偈云圓戒功德殊勝行無邊勝福皆回向普願沉溺諸有情速往無量廣佛剎十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密開導云不勞起具至誠頂禮壇上諸師三拜起身問訊分班開導大展三拜畢又云末後前行師舉南無本師釋迦牟尼佛迎至方丈前戒子轉身長跪合掌候師入室敷座開導拜畢起身傍立云一齊起身向上排班展全具開導召云新受菩薩戒弟子某甲眾齊稱名聞磬聲至誠頂禮九拜訖起具問訊分班後前行至法堂前鐘鼓齊止諸戒子聽開導師教誡或歸堂或巡寮戒子須知開導師勞苦至極恩過諸師凡此三壇大戒始終事須當至誠禮謝不得慢意珍重珍重斯戒本者大約有六一者立言之作誠非細事山中一時應機只可宜于山野之間非聞見于大方者也凡諸方傳戒諸師當依三峯古撰為佳萬一於我同志者依此傳授亦可何故聻法無定相遇緣即宗二者此本乃三壇戒之正文其餘羯磨教授尊證開導諸般佛事俱依弘戒法儀看眾之多寡期之短長院之大小時之否泰取而用之茲不重錄三者凡傳戒當依佛祖心行為戒定慧之傳弟子當依佛祖心地為戒定慧之受如是授受是為真受能令三寶種永無斷絕四者戒期開導之職非淺薄者所任須慈愛謙和方便接物為心經云我與眾生作不請之友者是也五者新戒須知開導恩過諸師凡此一期語默定動諸般法則莫不皆由開導而成但凡佛事之後為首者率眾稱名禮謝不得輕易忽慢當宜珍重六者求戒諸子當依十事一痛念生死二生大慚愧三至心發露四俱誠懺悔五發菩提心六作大誓願七生難遭想八生恭敬心九至誠受戒十知恩報恩凡此十條缺一不可果如此教善莫大焉願世世生生同為法侶知我罪我我無辭焉旹大清康熙貳拾㭍年歲次戊辰結冬制期侍者海聰盥沐焚香稽首謹書于蟠龍紫雲閣軒終
