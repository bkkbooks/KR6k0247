body:
  text: 明天啟北禪寺弘戒沙門法藏撰集清終南山蟠龍禪寺比丘超遠檢錄授沙彌十戒法卷上執事設座竟鳴磬三椎接疎鐘方丈傳香大眾俱集復傳鑪座上侍者禮畢擂鼓鐘聲迅速開導率諸子至方丈前長跪合掌開導進門觸具一拜起身傍立召諸子云作禮一拜起身又問訊末後前行和尚舉南無本師釋迦牟尼佛大眾同和迎至法堂前諸子兩邊長跪合掌和尚或遶壇拜畢陞座開導鳴磬一下鐘鼓肅靜二開導向上大展三拜長跪合掌和尚問云僧集否答云已集師云和合否答云和合師云僧今和合何所作為答云為諸佛子剃頭授戒師云善哉可爾答云是收具起問訊傍立召首者云上香又云一齊起身向上排班聞磬聲至誠頂三拜長跪合掌開導舉香讚君恩賜度親命非違斷除恩愛入無為師法稟儀威剃度披衣受戒自心歸登初地菩薩摩訶薩三遍開導召諸子云作禮三拜又云諸善男子等請師言句汝合自陳汝若不能皆隨我道唱念云大德一心念我某甲今請大德為剃頭受戒和尚願大德為我作剃頭受戒和尚我依大德故得剃頭受戒法慈愍故一拜慈愍故一拜大慈愍故一拜師撫尺云諸善男子等汝既慇勤伸請我為汝作剃頭授戒和尚所有開示汝當諦聽又撫尺云諸佛子等只遮一法心源湛寂法海淵深迷之者永劫沉淪悟之者當處解脫欲求歸道無越出家放曠喻如虗空清淨同於皎月修行緣具道果非遙始從尅念之功畢證無為之地所以我大覺世尊捨金輪之寶位子夜踰城脫珍銜之龍衣青山斷髮容鵲巢於頂上掛蛛網於眉間修寂滅而證真常斷塵勞而成正覺三世諸佛不說在家成道歷代祖師阿誰行染度人所以佛佛授受祖祖相傳不染世緣方成法器故得天魔拱手外道歸心上酬四重之恩下濟羣生之苦所以云流轉三界中恩愛不能捨棄恩入無為真是報恩者諸善男子等出家之法禮越常情不拜君王不拜父母汝今可離此座想念國王水土之恩父母生成之德專精拜辭後莫拜也開導召諸子云作禮一拜起身問訊轉身和尚舉云我今辭國王投佛作沙門誓成無上道報答國王恩共諸子同和子每句一拜畢問訊和尚舉云我今辭父母投佛作沙門願弘無上道報答父母恩同前和拜竟開導云起身問訊轉身長跪合掌和尚云諸善男子等汝已拜辭君王父母我以如來清淨法水差羯磨闍黎灌汝頂門令汝身心清淨魔障消除從佛口生從法化生為法王子當生慶幸開導召諸子答云惟願慈悲哀憐攝授諸子作禮一拜師舉淨瓶與羯磨師又云諸善男子等最後一結謂之周羅唯師一人乃能斷之我以如來金剛智刃差教授闍黎為汝除去圓成僧相當生慶幸開導召諸子答云惟願慈悲哀憐攝授諸子作禮一拜師舉剃刀與教授二闍黎出眾灌頂剃頭師云善哉真佛子摩頂證無生今授菩提記當來果自成開導同眾每句接和師復舉云善哉大丈夫能了世無常剃髮趣泥洹希有難思議眾接和同前師復舉云毀形守志節割愛辭所親出家弘聖道示度一切眾二闍黎灌頂剃頭竟問訊歸位接和同前開導召云作禮三拜師云諸沙彌等汝既剃度我當授汝鉢三衣具和尚加持沙彌應接師云鉢多羅應量器常用故今授持安陀會五條衣授一長一短大德一心念我沙彌某甲此鬱多羅僧七條衣授兩長一短割截衣持僧伽黎二十五條衣授四長一短尼師壇應量作今授持以上一一師傳舉子接應傳鉢畢開導召沙彌云起身傍立掛鉢師舉偈云鉢多羅應量器常用故今授持掛畢止念開導召諸子云向上長跪合掌師又加持衣具轉遮同前五衣善哉解脫服無上福田衣我今頂戴受世世不捨離唵悉陀耶娑婆訶七衣善哉解脫服無上福田衣我今頂戴受世世常得披唵度波度波娑婆訶大衣善哉解脫服無上福田衣奉行如來命廣度諸羣迷唵摩訶迦婆波吒悉地娑訶坐具臥具尼師壇長養心苗性展開登聖地奉行如來命唵壇波壇波娑訶以上眾亦然隨聲隨和隨拜畢師云諸善男子等法如大海漸入漸深汝既出家當先受三歸五戒方得近事大僧次受沙彌十戒乃可同僧利養事在專誠不得慢意我今為汝一心恭請三寶護法諸天攝授覆護方堪進戒汝當渴仰翹勤恭肅歸投聽我一心至誠奉請開導云香花引又云香花請師云我某甲一心奉請華藏世界清淨法身毗盧遮那世尊圓滿報身盧舍那世尊千百億化身本師釋迦牟尼世尊西方接引阿彌陀世尊當來下生彌勒世尊盡虗空徧法界一切諸佛世尊惟願不違本誓慈光攝照證明受戒開導云作禮三拜又云香花引又云香花請師云我某甲一心奉請大小二乘毗尼律藏五篇三聚解脫木叉三藏十二分經權實教典離欲真淨甚深法寶南無大方廣佛華嚴經謹運一心歸命敬禮開導云作禮三拜又云香花引亦云香花請師云我某甲一心奉請觀音勢至文殊普賢善才童子龍女真宰華嚴海眾諸大菩薩律藏會上優波離尊者西天東土歷代祖師終南山中諸大律師慧山清泉堂上上元下白大和尚華山隆昌堂上上見下月大和尚浮山華嚴堂上上文下弱大和尚本寺開山列代尊僧周鉢明志二位禪師惟願不違本誓慈光攝照證明受戒開導云作禮三拜又云香花引亦云香花請師云我某甲一心奉請華嚴會上寄位諸天梵釋四王天龍八部護戒善神金剛力士山川大地水陸虗空諸大神祗伽藍土地一切真宰惟願不違本誓臨降戒壇精嚴擁護開導云作禮三拜師云諸善男子等三寶光臨萬神侍衛欲求歸戒先當懺滌𠎝瑕如人浣衣然後加色汝今至誠隨我懺悔舉云我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔每句隨和拜畢師云諸善男子等汝今既淨身口意業應當歸依佛法僧寶師云我某甲歸依佛歸依法歸依僧歸依佛兩足尊歸依法離欲尊歸依僧眾中尊歸依佛竟歸依法竟歸依僧竟如來至真等正覺是我世尊我今歸依慈愍故一拜慈愍故一拜大慈愍故以上一一師三舉子三答畢三拜師云諸善男子等汝既捨邪歸正戒已圓成若欲識相護持應授五戒師云我某甲不殺生不偷盜盡形壽不邪婬是根本戒汝能持否答云能持不妄語不飲酒師撫尺云諸善男子等此支五戒一一不得犯汝能持否答云能持開導召沙彌云作禮三拜開導復云受五戒者起身出師云諸善男子等五戒為入道之初因出三途之元首即授沙彌十戒形備法儀此稱勤策依師而住受利同僧是為應法沙彌應當頂受師云我某甲不殺生不偷盜不婬欲不妄言綺語兩舌惡口不飲酒盡形壽是沙彌戒能持否答云能持不著香華鬘不香塗身不歌舞倡伎不往觀聽不坐高廣大床不非時食不捉持生像金銀寶物從不殺生至不捉持生像金銀寶物能持否答云能持師云此支十戒一一不得犯汝能持否答云能持師云諸善男子等汝今受戒之後當須頂戴奉持不得違犯所持戒律供養三寶勤種福田於和尚阿闍黎一如法教於上中下座心常恭敬精進行道報父母恩衣取蔽形不以文彩食取支命不得嗜味花香脂粉無以近身好色邪聲一無視聽徐言持正勿宣人短倘有爭者兩說和合男女有別草木無傷非賢不友非聖不宗法服應器常與人俱非時不食非法不言精勤思義溫故知新坐則禪思起則諷誦閉三惡道開涅槃門於比丘法中增長正業菩提心而不退般若智以長明廣化眾生齊成正覺用心如此真佛弟子師撫尺云諸善男子等從今下壇已去勤修戒定慧息滅貪嗔癡更當計取某年月日時授沙彌戒聖事既成當生慶幸一拜起身作法回向開導云作禮一拜起身師舉云受戒功德殊勝行無邊勝福皆回向普願沉溺諸有情速往無量廣佛剎回向因緣三世佛諸尊菩薩摩訶薩摩訶般若波羅密開導云不勞起具至誠頂禮和尚諸師三拜起具問訊又云分班又云末後前行至此鐘鼓齊鳴師舉南無本師釋迦牟尼佛至方丈前開導召沙彌云長跪合掌候師入室開導作禮三拜起身傍立召沙彌云作禮一拜起身問訊又云分班末後前行鍾鼓齊止說比丘戒法卷中執事設座畢鳴磬三下禪堂開大靜接鐘方丈傳香大眾俱集侍者傳爐座上拜訖開導滾擊子殿主擂鼓復召沙彌末後前行至九師所沙彌兩邊對面立定開導向九師觸具一拜傍立召沙彌云向上排班作禮一拜問訊分班又云末後前行至方丈前轉身長跪合掌開導佇立門外九師轉身傍立待羯磨師至住立中央諸師一齊向上一拜各歸本位開導展具作禮三拜起身傍立召沙彌云一齊起身向上排班展半具作禮三拜問訊長跪合掌開導云諸善男子等各各記取得戒和尚並及九師名字不得忘失乃云第一位某處某宗師為汝諸人作得戒大和尚第二位某處某禪師為汝諸人作羯磨阿闍黎第三位某處某禪師為汝諸人作教授阿闍黎第四位某處某禪師為汝諸人作尊證阿闍黎第五位某處某禪師為汝諸人作尊證阿闍黎第六位某處某禪師為汝諸人作尊證阿闍黎第七位某處某禪師為汝諸人作尊證阿闍黎第八位某處某禪師為汝諸人作尊證阿闍黎第九位某處某禪師為汝諸人作尊證阿闍黎第十位某處某禪師為汝諸人作尊證阿闍黎開導召沙彌云至誠作禮三拜開導作白云夫明鏡當臺遇形則鑑洪鐘在架有扣則鳴圓成三聚須假於三師舉檢七非全憑於七證今為汝請現前諸師為汝等作羯磨阿闍黎教授阿闍黎尊證阿闍黎所有請詞皆隨我道開導作梵沙彌隨和大德一心念我某甲今請大德為羯磨教授尊證阿闍黎願大德為我作羯磨教授尊證阿闍黎我依大德故得授具足戒慈愍故一拜慈愍故一拜大慈愍故一拜羯磨闍黎云諸佛子等汝既殷勤伸請我現前諸師為汝等作羯磨阿闍黎教授阿闍黎尊證阿闍黎清淨莫放逸沙彌答云頂戴奉行開導召戒子云作禮一拜又云今為汝請某處某宗師為汝等作得戒大和尚所有言詞皆隨我道開導作梵沙彌隨和大德一念我某甲今請大德為我作得戒和尚願大德為我作得戒和尚我依大德故得授具足戒慈愍故一拜慈愍故一拜大慈愍故一拜和尚撫尺云諸佛子等汝既殷勤伸請我為汝等作得戒和尚清淨莫放逸沙彌答云頂戴奉行開導召沙彌云作禮一拜起具問訊分班又云末後前行和尚舉南無本師釋迦牟尼佛大眾隨和迎至法堂前沙彌轉身對面長跪合掌十師進法堂遶壇一帀旋至二級向上莊立執事鳴磬三下鐘鼓暫止次十師大展三拜長跪合掌開導跪前宣祝聖文唯菩提之植種仰戒律以棓根誠為正法之隄防永作心宗之城壍匪憑外護曷固弘傳是以菩薩現輪王而致治人君開佛化以宣崇觀夫印土歷主之護興監彼支那積朝之勅闡況我聖朝大明慧日博扇玄風創開壇於洪武十年暨善述於成祖昭世神宗賜衣錫於五臺而律再振叢林瞻星日於三界以法重光況我大清皇帝竭佛日於中天統宗風於大地列聖恩深今皇德重比丘和尚俯地稱名開導又云感此山居無難人道多祥開後學以良愧樗材報洪庥而徒傾葵蕚願弘戒法永祝堯天敬修草莾之壇學展蘇羅之律衍無疆於聖壽祈鞏固之皇圖叡性日光神威震肅俾萬方之戈偃見四海之瑞呈內壺賦睢鳩青宮敏麟趾鎮干城於閫外挺柱石於朝中賢侯分化以闢疆黎庶歌風而擊壤嘉禾歲稔甘雨時調人人證梵網之門處處稟毗尼之德咸承垂拱共沐清和尚起身舉云持戒清淨如滿月身口皎潔無瑕穢大眾和合無遺諍是乃可得同授戒每句隨和畢十師作禮一拜起具問訊和尚復舉南無建壇四聖菩薩以舉菩薩鐘鼓齊鳴旋至建壇菩薩所十師齊跪和尚拈香畢一齊起身展半具作禮三拜問訊和尚仍舉南無本